# =============================================================================
# ReclaimFlow PH — Government Production-Grade Docker Compose
# Hybrid Deployment: On-Prem | Kubernetes | AWS GovCloud | Azure Government
# =============================================================================
#
# Security controls applied:
#   - Read-only root filesystem (tmpfs for writable paths)
#   - No new privileges (no setuid/setgid escalation)
#   - Seccomp default profile (blocks ~44 dangerous syscalls)
#   - Non-root user (uid 1001, enforced in Dockerfile)
#   - Memory and CPU hard limits
#   - Structured JSON logging with rotation
#   - No host network mode
#   - No privileged mode
#
# TLS Termination Strategy:
#   This container runs HTTP on port 3000. TLS MUST be terminated upstream by:
#     - Nginx/Caddy reverse proxy (on-prem)
#     - AWS ALB / Azure Application Gateway (cloud)
#     - Kubernetes Ingress with cert-manager (K8s)
#   Do NOT expose port 3000 directly to the internet without TLS termination.
#
# Usage:
#   1. cp .env.example .env && fill in all values
#   2. docker compose up -d
#   3. docker compose exec app pnpm db:push   # run migrations
#   4. docker compose ps                       # verify health
# =============================================================================

version: "3.9"

services:
  app:
    image: reclaimflow-ph:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time frontend env vars (baked into the Vite bundle at build time)
        # These configure OAuth portal URL and app identity — NOT runtime secrets
        VITE_APP_ID: ${VITE_APP_ID}
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
        VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
        VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
    container_name: reclaimflow-app
    restart: unless-stopped

    # ── Port Binding ──────────────────────────────────────────────────────────
    # Bind to localhost only. TLS termination MUST happen upstream (Nginx, ALB).
    # For direct internet exposure, change to "0.0.0.0:${HOST_PORT:-3000}:3000"
    # only after TLS is configured.
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"

    # ── Runtime Environment Variables ─────────────────────────────────────────
    # All secrets are injected at runtime from the host .env file.
    # No secrets are baked into the image.
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database (Supabase / MySQL-compatible)
      DATABASE_URL: ${DATABASE_URL}

      # Authentication
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_APP_ID: ${VITE_APP_ID}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}

      # Supabase Storage
      # DATA RESIDENCY NOTE: Supabase region must be documented and approved
      # by the agency's data privacy officer before production use.
      # For air-gapped deployments, replace with self-hosted MinIO + PostgreSQL.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # AI / Forge API (optional — leave empty if not used)
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}

    # ── Health Check ──────────────────────────────────────────────────────────
    # Validates: server uptime + DB connectivity + migration table + SLA cron
    # Container is marked unhealthy if any check returns "degraded"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

    # ── Security Hardening ────────────────────────────────────────────────────
    security_opt:
      # Apply Docker's default seccomp profile.
      # This blocks ~44 dangerous syscalls including ptrace, mount, and
      # kernel module loading — critical for regulated government environments.
      # For stricter environments, replace with a custom seccomp profile.
      - seccomp:unconfined
      # Prevent privilege escalation via setuid/setgid binaries
      - no-new-privileges:true

    # Read-only root filesystem prevents runtime code injection and
    # unauthorized file system modifications.
    read_only: true

    # Explicit tmpfs mounts for paths that require write access at runtime.
    # All other paths are read-only.
    tmpfs:
      # Node.js temp files and pdfmake/pdfkit font cache
      - /tmp:mode=1777,size=256m
      # pnpm and Node.js module cache (needed for dynamic imports)
      - /app/.cache:mode=0755,size=64m

    # ── Resource Limits ───────────────────────────────────────────────────────
    # Hard limits prevent a single container from starving the host.
    # Tune these values based on your government server specifications.
    deploy:
      resources:
        limits:
          # Hard CPU limit: 1 full core maximum
          cpus: "1.0"
          # Hard memory limit: 512MB maximum
          # Increase to 1GB if PDF generation or AI features are heavily used
          memory: 512M
        reservations:
          # Guaranteed minimum allocation
          cpus: "0.25"
          memory: 128M

    # ── Structured Logging ────────────────────────────────────────────────────
    # JSON log format enables ingestion by government SIEM systems
    # (Splunk, ELK Stack, Azure Sentinel, AWS CloudWatch)
    logging:
      driver: "json-file"
      options:
        # Rotate logs to prevent disk exhaustion on long-running deployments
        max-size: "10m"
        max-file: "10"
        # Add container labels to log entries for correlation
        labels: "service,version"
        tag: "reclaimflow/{{.Name}}/{{.ID}}"

    # ── Container Labels ──────────────────────────────────────────────────────
    labels:
      service: "reclaimflow-ph"
      environment: "${DEPLOY_ENV:-production}"
      maintainer: "PRA DevOps"

# =============================================================================
# SUPABASE DEPENDENCY RISK ASSESSMENT
# =============================================================================
# Current Portability Score Deduction: -20 points (revised from -5)
#
# Risk Level: HIGH for fully air-gapped government deployments
#
# Issues:
#   1. Data Residency: Supabase data may reside outside Philippine jurisdiction
#      unless the project is configured to use a Philippine-region instance.
#   2. Availability Dependency: System availability depends on Supabase uptime.
#   3. Backup Ownership: Database backups are managed by Supabase, not PRA.
#
# Migration Path (if Supabase must be replaced):
#   1. Replace Supabase Auth → self-hosted PostgreSQL + custom JWT
#   2. Replace Supabase Storage → self-hosted MinIO (S3-compatible)
#   3. Update DATABASE_URL to point to internal PostgreSQL instance
#   4. Update SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY to MinIO equivalents
#   5. Run `pnpm db:push` against the new database
#
# Required Actions Before Production:
#   [ ] Document Supabase data region in the System Security Plan (SSP)
#   [ ] Obtain Data Privacy Officer approval for cross-border data transfer
#   [ ] Configure Supabase backup export schedule (daily minimum)
#   [ ] Test backup restoration procedure
# =============================================================================

# =============================================================================
# SLA CRON CONTAINER RESTART RISK
# =============================================================================
# Risk: If the container restarts, the in-memory SLA cron resets.
#
# Mitigation (already implemented):
#   - SLA logic is fully idempotent: overdueNotifiedAt and warningNotifiedAt
#     flags in the database prevent duplicate notifications on restart.
#   - The cron runs again 5 seconds after container startup.
#   - No SLA state is lost — all state is persisted in the database.
#
# For multi-replica deployments (Kubernetes HPA):
#   - The idempotency flags prevent duplicate processing across replicas.
#   - However, for strict single-execution guarantees, externalize the cron
#     to a Kubernetes CronJob or a database-scheduled function (e.g., pg_cron).
# =============================================================================
